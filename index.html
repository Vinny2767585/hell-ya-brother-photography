<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hell Ya Brother Photography - Premium automotive photography portfolio">
    <title>Hell Ya Brother Photography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f0f0f;
            --secondary-dark: #1a1a1a;
            --accent: #ff6b35;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #2a2a2a;
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header & Navigation */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(180deg, var(--primary-dark) 0%, rgba(15, 15, 15, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--accent);
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: var(--transition);
            border: 2px solid var(--accent);
            cursor: pointer;
            font-size: 1rem;
        }

        .cta-button:hover {
            background-color: transparent;
            color: var(--accent);
        }

        /* Gallery Section */
        .gallery-section {
            padding: 6rem 2rem;
            background-color: var(--secondary-dark);
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Masonry Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            group: 'image';
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
            filter: brightness(0.7);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: var(--transition);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-title {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            background-color: var(--primary-dark);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 1rem;
                font-size: 0.85rem;
            }

            .hero {
                min-height: 50vh;
                padding: 2rem 1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
            }

            .gallery-section {
                padding: 4rem 1rem;
            }

            .section-header {
                margin-bottom: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                gap: 0.8rem;
                font-size: 0.75rem;
            }

            .logo {
                font-size: 1.1rem;
                letter-spacing: 1px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 0.8rem;
            }

            .gallery-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">HYBP</div>
                <ul class="nav-links">
                    <li><a href="#gallery">Gallery</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hell Ya Brother Photography</h1>
            <p>PREMIUM AUTOMOTIVE PHOTOGRAPHY</p>
            <button class="cta-button" onclick="document.getElementById('gallery').scrollIntoView();">
                View Gallery
            </button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallery">
        <div class="container">
            <div class="section-header">
                <h2>Recent Work</h2>
                <p>Capturing the raw beauty and power of automotive excellence</p>
            </div>
            <div id="gallery-grid" class="gallery-grid">
                <div class="loading">
                    <span class="spinner"></span>
                    Loading gallery...
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="contact">
        <div class="container">
            <p>&copy; 2024 Hell Ya Brother Photography. All rights reserved.</p>
            <p>Built with passion and JavaScript</p>
        </div>
    </footer>

    <script>
        // Fetch and render gallery from images.json
        async function loadGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            
            try {
                const response = await fetch('./images.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const images = await response.json();
                
                if (!Array.isArray(images) || images.length === 0) {
                    galleryGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <p>Gallery coming soon. Check back for fresh content!</p>
                        </div>
                    `;
                    return;
                }
                
                // Clear loading state
                galleryGrid.innerHTML = '';
                
                // Render each image
                images.forEach(image => {
                    const imageElement = createGalleryItem(image);
                    galleryGrid.appendChild(imageElement);
                });
                
            } catch (error) {
                console.error('Error loading gallery:', error);
                galleryGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <p>Unable to load gallery. Please try again later.</p>
                    </div>
                `;
            }
        }
        
        // Create individual gallery item element
        function createGalleryItem(image) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            item.innerHTML = `
                <img 
                    src="${image.url}" 
                    alt="${image.title}"
                    loading="lazy"
                >
                <div class="gallery-overlay">
                    <span class="gallery-title">${image.title}</span>
                </div>
            `;
            
            return item;
        }
        
        // Load gallery when DOM is ready
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
